<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A Touch of Blessings Home Buyers — Sell Your House the Easy Way</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f4f1ea;
    --bg-2: #ece7dc;
    --paper: #fbf9f4;
    --ink: #1c1b18;
    --ink-2: #46443e;
    --ink-3: #7a766c;
    --line: #d9d3c4;
    --line-2: #e6e1d3;
    --accent: #5a6a3a;       /* deep olive */
    --accent-deep: #3f4b27;
    --accent-soft: #c7cda6;
    --gold: #b89456;
    --danger: #b14a3a;
    --ok: #4a7a4a;
    --radius: 14px;
    --radius-lg: 22px;
    --shadow-sm: 0 1px 2px rgba(28,27,24,.04), 0 2px 6px rgba(28,27,24,.05);
    --shadow-md: 0 8px 24px rgba(28,27,24,.08), 0 2px 6px rgba(28,27,24,.04);
    --shadow-lg: 0 24px 60px rgba(28,27,24,.18), 0 8px 16px rgba(28,27,24,.08);
    --serif: "Instrument Serif", "Cormorant Garamond", Georgia, serif;
    --sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .mono  { font-family: var(--mono); }

  /* utility: subtle striped placeholder for missing imagery */
  .img-ph {
    background:
      repeating-linear-gradient(135deg, rgba(28,27,24,.05) 0 1px, transparent 1px 10px),
      var(--bg-2);
    color: var(--ink-3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: var(--radius);
  }

  /* ===== Nav ===== */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: rgba(244, 241, 234, 0.78);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid rgba(28,27,24,.06);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--ink);
    display: grid; place-items: center;
    overflow: hidden;
    padding: 4px;
    flex-shrink: 0;
  }
  .brand-mark img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  .brand-name { font-family: var(--serif); font-size: 22px; line-height: 1; }
  .brand-name em { font-style: italic; }
  .brand-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-size: 14px; color: var(--ink-2);
    padding: 8px 4px;
    border-bottom: 1px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .nav-links a:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--paper);
    font-size: 14px; font-weight: 500;
  }
  .nav-cta:hover { background: var(--accent-deep); }
  .nav-cta .dot { width: 6px; height: 6px; border-radius: 50%; background: #6ec76e; box-shadow: 0 0 0 3px rgba(110,199,110,.25); }
  @media (max-width: 900px) {
    .nav-links { display: none; }
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    padding: 88px 0 96px;
    isolation: isolate;
    color: var(--paper);
    min-height: 760px;
    display: flex;
    align-items: center;
  }
  .hero-inner { width: 100%; }
  .hero-copy { max-width: 920px; }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("assets/hero-bg.png");
    background-size: cover;
    background-position: center 35%;
    z-index: -2;
  }
  .hero::after {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(20,22,28,.55) 0%, rgba(20,22,28,.35) 35%, rgba(20,22,28,.78) 100%),
      linear-gradient(90deg, rgba(20,22,28,.55) 0%, rgba(20,22,28,.15) 60%, rgba(20,22,28,.05) 100%);
    z-index: -1;
  }
  .hero-scroll-cta {
    display: inline-flex; align-items: center; gap: 12px;
    margin-top: 36px;
    padding: 16px 26px;
    border-radius: 999px;
    background: var(--paper);
    color: var(--ink);
    font-weight: 500;
    font-size: 15px;
    box-shadow: var(--shadow-md);
    transition: transform .2s, box-shadow .2s;
  }
  .hero-scroll-cta:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .hero-scroll-cta .arrow {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-size: 14px;
    animation: bob 1.8s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(3px); }
  }

  /* ===== Form Section (now standalone, below hero) ===== */
  .form-section {
    background: var(--bg-2);
    padding: 88px 0;
    position: relative;
  }
  .form-section-grid {
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: 64px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .form-section-grid { grid-template-columns: 1fr; gap: 36px; }
  }
  .form-section-aside { padding-top: 12px; }
  .form-section-aside .num {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 14px;
  }
  .form-section-h {
    font-family: var(--serif);
    font-size: clamp(40px, 4.6vw, 60px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0 0 24px;
    color: var(--ink);
  }
  .form-section-h em { font-style: italic; color: var(--accent-deep); }
  .form-section-note {
    font-size: 16px;
    color: var(--ink-2);
    max-width: 44ch;
    margin: 0 0 28px;
    line-height: 1.55;
  }
  .form-section-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 14px;
  }
  .form-section-list li {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 14px;
    align-items: center;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.4;
  }
  .form-section-list li .bullet {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: var(--paper);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .form-section-list li .bullet svg { display: block; }
  .form-section-list li .txt { display: block; }
  .hero .h1 { color: var(--paper); }
  .hero .h1 em { color: #e6c98a; }
  .hero .h1 .strike::after { background: var(--paper); }
  .hero .lede { color: rgba(251,249,244,.85); }
  .hero .eyebrow {
    background: rgba(20,22,28,.45);
    border-color: rgba(251,249,244,.22);
    color: rgba(251,249,244,.9);
    backdrop-filter: blur(6px);
  }
  .hero .trust-item { color: rgba(251,249,244,.92); }
  .hero .trust-item span[style] { color: #b3d6a8 !important; }
  .hero .stat-row {
    background: rgba(251,249,244,.18);
    border-top-color: rgba(251,249,244,.22);
    border-bottom-color: rgba(251,249,244,.22);
  }
  .hero .stat {
    background: rgba(20,22,28,.45);
    backdrop-filter: blur(6px);
  }
  .hero .stat .num { color: var(--paper); }
  .hero .stat .num em { color: #e6c98a; }
  .hero .stat .lbl { color: rgba(251,249,244,.65); }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; gap: 36px; }
    .hero { min-height: 0; padding: 64px 0 72px; }
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 8px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .eyebrow .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(74,122,74,.4);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,122,74,.45); }
    70% { box-shadow: 0 0 0 8px rgba(74,122,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,122,74,0); }
  }

  .h1 {
    font-family: var(--serif);
    font-size: clamp(44px, 6.2vw, 84px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 22px 0 18px;
    color: var(--ink);
  }
  .h1 em { font-style: italic; color: var(--accent-deep); }
  .h1 .strike { position: relative; }
  .h1 .strike::after {
    content: ""; position: absolute; left: -2%; right: -2%; top: 55%;
    height: 2px; background: var(--ink); transform: rotate(-3deg);
  }

  .lede {
    font-size: 18px;
    color: var(--ink-2);
    max-width: 540px;
    line-height: 1.5;
  }

  .trust-row {
    margin-top: 28px;
    display: flex; flex-wrap: wrap; gap: 18px 28px;
    align-items: center;
  }
  .trust-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink-2); }
  .trust-item svg { flex-shrink: 0; }

  .stat-row {
    margin-top: 36px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .stat {
    background: var(--bg);
    padding: 20px 4px 18px;
  }
  .stat .num { font-family: var(--serif); font-size: 38px; line-height: 1; letter-spacing: -0.02em; }
  .stat .num em { font-style: italic; color: var(--accent); }
  .stat .lbl { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-top: 8px; }

  /* ===== Form Card ===== */
  .form-card-wrap {
    position: relative;
  }
  .form-card-wrap::before {
    content: "";
    position: absolute; inset: 24px -18px -22px 22px;
    background: var(--accent-deep);
    border-radius: var(--radius-lg);
    z-index: 0;
    opacity: 0.95;
  }
  .form-card-wrap::after {
    content: "Cash offer in 24h";
    position: absolute;
    right: -10px; top: -16px;
    background: var(--gold);
    color: #1c1b18;
    font-family: var(--mono);
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 999px;
    transform: rotate(3deg);
    z-index: 3;
    box-shadow: var(--shadow-sm);
  }
  .form-card {
    position: relative; z-index: 1;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px 28px 24px;
    box-shadow: var(--shadow-md);
  }
  .form-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 20px;
  }
  .form-head h3 {
    margin: 0;
    font-family: var(--serif);
    font-size: 30px;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .form-head p {
    margin: 6px 0 0;
    font-size: 13.5px;
    color: var(--ink-3);
    max-width: 320px;
  }
  .step-badge {
    flex-shrink: 0;
    text-align: right;
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .step-badge .now { color: var(--accent-deep); font-weight: 500; }

  .progress {
    display: flex; gap: 6px;
    margin-bottom: 22px;
  }
  .progress .seg {
    flex: 1;
    height: 4px;
    background: var(--line-2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress .seg.done { background: var(--accent); }
  .progress .seg.active {
    background: linear-gradient(to right, var(--accent), var(--accent) 40%, var(--line-2) 40%, var(--line-2));
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .field label .req { color: var(--accent); margin-left: 2px; }
  .input, .select, .textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 15px;
    color: var(--ink);
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--paper);
    box-shadow: 0 0 0 4px rgba(90,106,58,.12);
  }
  .input::placeholder { color: var(--ink-3); }
  .field.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field.row2 > div { margin: 0; }
  .input-icon {
    position: relative;
  }
  .input-icon svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3);
  }
  .input-icon .input { padding-left: 42px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 14px;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--line);
    font-size: 13.5px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--ink-3); color: var(--ink); }
  .chip.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .form-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 22px; gap: 12px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 500;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-ghost { color: var(--ink-2); }
  .btn-ghost:hover { color: var(--ink); }
  .btn-block { width: 100%; }

  .micro {
    margin-top: 12px;
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .micro svg { flex-shrink: 0; color: var(--ink-3); }

  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 4px;
  }

  /* success state */
  .success {
    text-align: center;
    padding: 16px 6px 6px;
  }
  .success .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent);
    color: var(--paper);
    display: grid; place-items: center;
    margin: 0 auto 18px;
  }
  .success h3 { font-family: var(--serif); font-size: 32px; margin: 0 0 8px; letter-spacing: -0.01em; }
  .success p { color: var(--ink-2); font-size: 15px; max-width: 360px; margin: 0 auto; }
  .success-meta {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line-2);
    margin-top: 22px;
    border: 1px solid var(--line-2);
    border-radius: 10px;
    overflow: hidden;
  }
  .success-meta > div { background: var(--paper); padding: 14px 8px; }
  .success-meta .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .success-meta .v { font-family: var(--serif); font-size: 22px; margin-top: 6px; }

  /* ===== Section base ===== */
  section { padding: 96px 0; }
  .section-head {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 24px; align-items: end;
    margin-bottom: 56px;
  }
  .section-head .num {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); padding-bottom: 14px;
  }
  .section-head h2 {
    font-family: var(--serif);
    font-size: clamp(38px, 4.6vw, 62px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0;
    max-width: 14ch;
  }
  .section-head h2 em { font-style: italic; color: var(--accent-deep); }
  .section-head .note {
    max-width: 320px;
    color: var(--ink-2);
    font-size: 15px;
    padding-bottom: 4px;
  }
  @media (max-width: 820px) {
    .section-head { grid-template-columns: 1fr; gap: 16px; }
    .section-head h2 { max-width: none; }
  }

  /* ===== Logos / press strip ===== */
  .strip {
    padding: 30px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .strip-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    flex-wrap: wrap;
  }
  .strip-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .strip-logos { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .strip-logo {
    font-family: var(--serif); font-size: 20px; color: var(--ink-2); opacity: 0.7;
    letter-spacing: -0.01em;
  }
  .strip-logo.alt { font-family: var(--mono); text-transform: uppercase; font-size: 13px; letter-spacing: 0.18em; }
  .strip-logo .it { font-style: italic; }

  /* ===== How it works ===== */
  .steps {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  @media (max-width: 820px) {
    .steps { grid-template-columns: 1fr; }
  }
  .step {
    background: var(--paper);
    padding: 36px 32px 38px;
    position: relative;
  }
  .step .step-n {
    display: inline-block;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent);
    padding-bottom: 18px;
  }
  .step h3 { font-family: var(--serif); font-size: 30px; margin: 0 0 10px; letter-spacing: -0.01em; line-height: 1.1; }
  .step p { margin: 0; color: var(--ink-2); font-size: 15px; line-height: 1.55; }
  .step .step-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--bg-2);
    display: grid; place-items: center;
    color: var(--accent-deep);
    margin-bottom: 22px;
  }
  .step .meta { margin-top: 20px; font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; }

  /* ===== Why us ===== */
  .compare {
    display: grid; grid-template-columns: 1.1fr 1fr;
    gap: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  @media (max-width: 820px) {
    .compare { grid-template-columns: 1fr; }
  }
  .compare-col { padding: 36px 32px; }
  .compare-col.us {
    background: var(--ink);
    color: var(--paper);
  }
  .compare-col.us .compare-h { color: var(--paper); }
  .compare-col.them { background: var(--paper); border-left: 1px solid var(--line); }
  @media (max-width: 820px) {
    .compare-col.them { border-left: none; border-top: 1px solid var(--line); }
  }
  .compare-h {
    font-family: var(--serif);
    font-size: 28px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .compare-sub {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 24px;
  }
  .compare-col.us .compare-sub { color: rgba(251,249,244,.55); }
  .compare-list { margin: 0; padding: 0; list-style: none; }
  .compare-list li {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 0;
    border-top: 1px solid var(--line-2);
    font-size: 15px;
  }
  .compare-col.us .compare-list li { border-top-color: rgba(251,249,244,.1); }
  .compare-list li .ic {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    display: grid; place-items: center;
    margin-top: 2px;
  }
  .compare-list li .ic.yes { background: var(--accent); color: var(--paper); }
  .compare-list li .ic.no { background: rgba(28,27,24,.08); color: var(--ink-3); }
  .compare-col.us .compare-list li .ic.yes { background: var(--accent-soft); color: var(--ink); }
  .compare-col.us .compare-list li strong { color: var(--paper); }
  .compare-list .k { font-size: 14.5px; }
  .compare-list .v { display: block; font-size: 12.5px; color: var(--ink-3); margin-top: 3px; }
  .compare-col.us .compare-list .v { color: rgba(251,249,244,.55); }

  /* ===== Situations grid ===== */
  .situations {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 980px) { .situations { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .situations { grid-template-columns: 1fr; } }
  .sit {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 22px 22px;
    transition: all .2s;
    cursor: default;
    display: flex; flex-direction: column; gap: 8px;
  }
  .sit:hover {
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .sit .ic {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--bg-2); color: var(--accent-deep);
    display: grid; place-items: center;
    margin-bottom: 6px;
  }
  .sit h4 { margin: 0; font-family: var(--serif); font-size: 22px; letter-spacing: -0.005em; line-height: 1.1; }
  .sit p { margin: 0; font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }

  /* ===== Testimonial ===== */
  .testimonials {
    display: grid; grid-template-columns: 1.2fr 1fr;
    gap: 32px;
  }
  @media (max-width: 980px) { .testimonials { grid-template-columns: 1fr; } }
  .quote {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 40px 38px;
    position: relative;
  }
  .quote .mark {
    font-family: var(--serif); font-size: 130px; line-height: 0.6;
    color: var(--accent-soft);
    position: absolute; top: 28px; left: 28px;
  }
  .quote blockquote {
    margin: 0 0 22px;
    font-family: var(--serif);
    font-size: 30px;
    line-height: 1.18;
    letter-spacing: -0.01em;
    text-wrap: pretty;
    position: relative;
  }
  .quote blockquote em { font-style: italic; color: var(--accent-deep); }
  .quote .who { display: flex; align-items: center; gap: 14px; padding-top: 22px; border-top: 1px solid var(--line-2); }
  .quote .who .av { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-2); flex-shrink: 0; display: grid; place-items: center; font-family: var(--serif); font-size: 20px; color: var(--ink-2); }
  .quote .who .who-name { font-weight: 500; font-size: 14.5px; }
  .quote .who .who-meta { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }

  .mini-quotes { display: grid; gap: 16px; }
  .mini-quote {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 22px;
  }
  .mini-quote .stars {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .mini-quote p { margin: 0 0 14px; font-size: 14.5px; line-height: 1.5; color: var(--ink); }
  .mini-quote .src { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-3); font-family: var(--mono); letter-spacing: 0.06em; }

  /* ===== FAQ ===== */
  .faqs { border-top: 1px solid var(--line); }
  .faq {
    border-bottom: 1px solid var(--line);
    padding: 22px 0;
  }
  .faq summary {
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; list-style: none;
    font-family: var(--serif);
    font-size: 24px;
    letter-spacing: -0.005em;
    padding-right: 16px;
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq summary .plus {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--line);
    display: grid; place-items: center;
    color: var(--ink-2);
    transition: all .2s;
    flex-shrink: 0;
  }
  .faq[open] summary .plus { background: var(--ink); color: var(--paper); border-color: var(--ink); transform: rotate(45deg); }
  .faq .a {
    color: var(--ink-2);
    font-size: 15.5px;
    line-height: 1.6;
    max-width: 70ch;
    margin-top: 14px;
  }

  /* ===== Final CTA ===== */
  .final {
    background: var(--ink);
    color: var(--paper);
    border-radius: var(--radius-lg);
    padding: 72px 64px;
    margin: 40px 0;
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 720px) { .final { padding: 48px 28px; } }
  .final::before {
    content: ""; position: absolute; right: -120px; top: -120px;
    width: 360px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), transparent 70%);
    opacity: 0.6;
  }
  .final-grid {
    display: grid; grid-template-columns: 1.4fr 1fr;
    gap: 48px; align-items: center;
    position: relative; z-index: 1;
  }
  @media (max-width: 820px) { .final-grid { grid-template-columns: 1fr; } }
  .final h2 {
    font-family: var(--serif);
    font-size: clamp(38px, 5vw, 64px);
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0 0 18px;
  }
  .final h2 em { font-style: italic; color: var(--accent-soft); }
  .final p { color: rgba(251,249,244,.7); font-size: 17px; max-width: 46ch; line-height: 1.5; }
  .final-actions { display: flex; gap: 12px; margin-top: 26px; flex-wrap: wrap; }
  .btn-light { background: var(--paper); color: var(--ink); }
  .btn-light:hover { background: var(--accent-soft); }
  .btn-outline { border: 1px solid rgba(251,249,244,.3); color: var(--paper); }
  .btn-outline:hover { border-color: var(--paper); }
  .final-aside {
    background: rgba(251,249,244,.05);
    border: 1px solid rgba(251,249,244,.12);
    border-radius: var(--radius);
    padding: 26px;
  }
  .final-aside .label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(251,249,244,.55); }
  .final-aside .big { font-family: var(--serif); font-size: 38px; margin-top: 8px; letter-spacing: -0.01em; }
  .final-aside .sub { font-size: 13px; color: rgba(251,249,244,.65); margin-top: 6px; }
  .final-aside .row { display: flex; justify-content: space-between; align-items: baseline; padding-top: 18px; margin-top: 18px; border-top: 1px solid rgba(251,249,244,.12); font-size: 14px; }
  .final-aside .row .k { color: rgba(251,249,244,.55); font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ===== Footer ===== */
  footer {
    padding: 56px 0 40px;
    border-top: 1px solid var(--line);
    color: var(--ink-2);
    font-size: 13px;
  }
  .foot-grid {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 36px;
    margin-bottom: 40px;
  }
  @media (max-width: 820px) { .foot-grid { grid-template-columns: 1fr 1fr; } }
  .foot-col h5 {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    margin: 0 0 14px; color: var(--ink-3);
  }
  .foot-col a { display: block; padding: 5px 0; color: var(--ink-2); }
  .foot-col a:hover { color: var(--ink); }
  .foot-bottom { display: flex; justify-content: space-between; padding-top: 28px; border-top: 1px solid var(--line); font-size: 12px; color: var(--ink-3); flex-wrap: wrap; gap: 12px; }

  /* ===== Sticky mobile CTA ===== */
  .sticky-cta {
    position: fixed; left: 16px; right: 16px; bottom: 16px;
    z-index: 50;
    background: var(--ink);
    color: var(--paper);
    border-radius: 999px;
    padding: 14px 20px;
    box-shadow: var(--shadow-lg);
    display: none;
    align-items: center; justify-content: space-between;
    font-size: 14px;
  }
  .sticky-cta .pill {
    background: var(--gold); color: #1c1b18;
    padding: 6px 12px; border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  @media (max-width: 820px) {
    .sticky-cta.show { display: flex; }
  }

  /* address autofill suggestions */
  .suggest {
    position: absolute;
    left: 0; right: 0; top: calc(100% + 4px);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
    z-index: 5;
    max-height: 220px; overflow: auto;
  }
  .suggest .s-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 11px 14px;
    border-bottom: 1px solid var(--line-2);
    font-size: 14px;
    cursor: pointer;
  }
  .suggest .s-item:hover { background: var(--bg); }
  .suggest .s-item:last-child { border-bottom: none; }
  .suggest .s-item .s-pin { color: var(--ink-3); flex-shrink: 0; margin-top: 2px; }
  .suggest .s-item .s-city { font-size: 12.5px; color: var(--ink-3); display: block; }

  /* Tweaks z-index */
  .tweaks-anchor { position: relative; z-index: 1000; }
</style>
</head>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="form.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
